version: '3'

tasks:
  # 疎通確認用
  hello:
    cmds:
      - echo "Hello from Docker with mise & Go!"
      - go version
      - node --version
      - task --version

  # Goの初期セットアップ（最初の一回だけ実行）
  init:
    cmds:
      - go mod init stock-analyzer || echo "go.mod already exists"
      - go get modernc.org/sqlite
      - mkdir -p data data/raw web scripts

  # Goの実行
  run:
    cmds:
      - go run . {{.CLI_ARGS}}

  # データベースの圧縮
  compress:
    cmds:
      - chmod +x scripts/compress_db.sh
      - ./scripts/compress_db.sh

  # ローカルでのWebサーバー起動
  serve:
    cmds:
      - go run . -mode=serve

  # テストパース実行
  test-parse:
    cmds:
      - go run . -mode=test-parse

  # TDNET 適時開示の取得（注: 過去31日分のみ取得可能）
  fetch-tdnet:
    desc: "TDNET 適時開示メタデータの取得 (DATE=YYYY-MM-DD で日付指定、デフォルトは今日)"
    cmds:
      - |
        if [ -n "{{.DATE}}" ]; then
          go run . -mode=fetch-tdnet -date={{.DATE}}
        else
          go run . -mode=fetch-tdnet
        fi

  # 決算短信PDFのパース (TDNETから取得した開示メタデータが前提)
  # 1. task fetch-tdnet DATE=YYYY-MM-DD で開示一覧を取得
  # 2. task parse-tanshin DATE=YYYY-MM-DD で当日分の決算短信PDFをパース
  parse-tanshin:
    desc: "TDNET決算短信PDFのパース (DATE=YYYY-MM-DD 必須、poppler-utils必要)"
    cmds:
      - go run . -mode=parse-tanshin -date={{.DATE}}
    requires:
      vars: [DATE]

  # 当日の注目銘柄アラート (RS急上昇/業績修正/出来高急増)
  alerts:
    desc: "当日のアラート検出 → Markdown 出力 (DATE=YYYY-MM-DD、デフォルトは今日)"
    cmds:
      - |
        if [ -n "{{.DATE}}" ]; then
          go run . -mode=detect-alerts -date={{.DATE}}
        else
          go run . -mode=detect-alerts
        fi

  # JPX 上場銘柄一覧の取込
  # 1. https://www.jpx.co.jp/markets/statistics-equities/misc/01.html から data_j.xls をダウンロード
  # 2. Excel/Numbers で UTF-8 CSV として保存 (例: data/jpx_listed.csv)
  # 3. task import-jpx FILE=data/jpx_listed.csv
  import-jpx:
    desc: "JPX 上場銘柄一覧 CSV の取込 (FILE=path/to/jpx.csv 必須)"
    cmds:
      - go run . -mode=import-jpx -file={{.FILE}}
    requires:
      vars: [FILE]

  # 日次更新シミュレーション
  daily-update:
    cmds:
      - echo "🚀 Starting daily update simulation..."
      - go run . -mode=run -date={{.DATE | default "2025-11-13"}}
      - task: compress
      - echo "✅ Daily update completed"

  # GitHub Pages 用の静的ファイル生成
  build-web:
    cmds:
      - echo "🌐 Building web assets..."
      - task: compress
      - echo "✅ Web assets ready in web/"

  # クリーンアップ
  clean:
    cmds:
      - rm -f data/stock_data.db data/stock_data.db.gz
      - echo "🧹 Cleaned database files"

  # バルクロード: 過去1年分のEDINETデータを一括取得
  # 使い方:
  #   task bulk-load FROM=2025-04-01 TO=2026-03-30
  #   task bulk-load FROM=2025-04-01 TO=2026-03-30 SKIP_PRICES=1  # 株価取得をスキップ
  bulk-load:
    desc: "過去データの一括取得（EDINET_API_KEY環境変数が必要）"
    cmds:
      - echo "🚀 バルクロード開始 ({{.FROM}} 〜 {{.TO}})"
      - go run . -mode=batch -from={{.FROM}} -to={{.TO}}
      - echo ""
      - |
        if [ "{{.SKIP_PRICES}}" = "1" ]; then
          echo "⏭️ 株価取得をスキップ (SKIP_PRICES=1)"
        else
          echo "📈 株価データ取得中..."
          go run . -mode=fetch-prices
        fi
      - echo ""
      - echo "📊 RS計算中..."
      - go run . -mode=calc-rs
      - echo ""
      - echo "📦 DB圧縮中..."
      - task compress
      - echo ""
      - echo "✅ バルクロード完了!"
      - 'echo "📋 次のステップ: task upload-db でGitHub Releasesにアップロード"'
    vars:
      FROM: '{{.FROM | default "2025-04-01"}}'
      TO: '{{.TO | default "2026-03-30"}}'
      SKIP_PRICES: '{{.SKIP_PRICES | default ""}}'

  # DBをGitHub Releasesにアップロード
  # gh CLI が必要: brew install gh
  upload-db:
    desc: "圧縮済みDBをGitHub Releasesにアップロード"
    cmds:
      - |
        DATE=$(date +%Y-%m-%d)
        TAG="data-local-${DATE}"
        echo "📤 Uploading databases to GitHub Release: ${TAG}"
        
        # DB統計
        echo ""
        echo "📊 アップロードするDB統計:"
        if [ -f data/xbrl.db ]; then
          sqlite3 data/xbrl.db "SELECT '  銘柄数: ' || COUNT(*) FROM stocks;"
          sqlite3 data/xbrl.db "SELECT '  売上あり: ' || COUNT(*) FROM stocks WHERE net_sales > 0;"
        fi
        if [ -f data/stock_price.db ]; then
          sqlite3 data/stock_price.db "SELECT '  株価銘柄: ' || COUNT(DISTINCT code) FROM stock_prices;"
        fi
        
        echo ""
        
        # リリース作成 & アップロード
        gh release create "${TAG}" \
          --title "Local Bulk Load - ${DATE}" \
          --notes "ローカルバッチ実行によるデータアップロード" \
          data/xbrl.db.gz data/stock_price.db.gz data/rs.db.gz \
          --latest
        
        echo "✅ アップロード完了: ${TAG}"

