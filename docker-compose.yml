services:
  app:
    build: .
    volumes:
      - .:/app
      - ${HOME}/.config/gh:/root/.config/gh  # ホストの gh 認証情報をマウント (upload-db タスク用)
    ports:
      - "127.0.0.1:8080:8080"  # ローカル開発専用のためループバックのみにバインド
    tty: true
    stdin_open: true
    environment:
      - EDINET_API_KEY=${EDINET_API_KEY:-}
      - GH_TOKEN=${GH_TOKEN:-}