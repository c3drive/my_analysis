name: Daily Stock Data Update

on:
  schedule:
    # 毎日 18:00 JST (09:00 UTC) に実行
    - cron: "0 9 * * *"
  workflow_dispatch: # 手動実行も可能
    inputs:
      days_back:
        description: '何日前まで遡って取得するか（デフォルト: 30）'
        required: false
        default: '30'

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write    # リリースの作成とタグの更新に必要
      issues: write      # 失敗時のIssue作成に必要
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
      
      - name: Install dependencies
        run: |
          go mod download
          mkdir -p data/raw
      
      - name: Download latest DBs from release (if exists)
        continue-on-error: true
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')
          
          if [ "$LATEST_TAG" != "null" ] && [ "$LATEST_TAG" != "" ]; then
            echo "📥 Found latest release: $LATEST_TAG"
            
            # 3-DB構成: xbrl.db, stock_price.db, rs.db
            for DB_NAME in xbrl.db stock_price.db rs.db; do
              echo "  Downloading $DB_NAME..."
              curl -L -o "data/${DB_NAME}.gz" \
                "https://github.com/${{ github.repository }}/releases/download/$LATEST_TAG/${DB_NAME}.gz" \
                2>/dev/null || echo "  ⚠️ $DB_NAME not found in release"
              
              if [ -f "data/${DB_NAME}.gz" ]; then
                gunzip "data/${DB_NAME}.gz"
                echo "  ✅ $DB_NAME restored"
              fi
            done
            
            # レガシーDB対応（stock_data.db → 3DB移行）
            if [ ! -f data/xbrl.db ]; then
              echo "  Trying legacy stock_data.db..."
              curl -L -o data/stock_data.db.gz \
                "https://github.com/${{ github.repository }}/releases/download/$LATEST_TAG/stock_data.db.gz" \
                2>/dev/null || echo "  ⚠️ Legacy DB not found either"
              if [ -f data/stock_data.db.gz ]; then
                gunzip data/stock_data.db.gz
                echo "  ✅ Legacy DB restored (will be migrated on first run)"
              fi
            fi
            
            # 復元後のDB統計を出力
            echo "📊 Pre-update stats:"
            if [ -f data/xbrl.db ]; then
              sqlite3 data/xbrl.db "SELECT COUNT(*) || ' total stocks' FROM stocks;" 2>/dev/null || true
              sqlite3 data/xbrl.db "SELECT COUNT(*) || ' with sales data' FROM stocks WHERE net_sales > 0;" 2>/dev/null || true
            fi
            if [ -f data/stock_price.db ]; then
              sqlite3 data/stock_price.db "SELECT COUNT(DISTINCT code) || ' stocks with prices' FROM stock_prices;" 2>/dev/null || true
            fi
          else
            echo "ℹ️ No previous release found, starting fresh"
          fi
      
      - name: Fetch EDINET data (multiple days)
        run: |
          DAYS_BACK=${{ github.event.inputs.days_back || '30' }}
          echo "🚀 Fetching EDINET data for the past $DAYS_BACK days..."
          
          TOTAL_PROCESSED=0
          TOTAL_NEW=0
          
          for i in $(seq 0 $((DAYS_BACK - 1))); do
            TARGET_DATE=$(date -u -d "$i days ago" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d)
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📅 Processing: $TARGET_DATE"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            OUTPUT=$(go run main.go -mode=run -date=$TARGET_DATE 2>&1) || true
            echo "$OUTPUT"
            
            PROCESSED=$(echo "$OUTPUT" | grep -oP '処理=\K[0-9]+' || echo "0")
            TOTAL_PROCESSED=$((TOTAL_PROCESSED + PROCESSED))
            
            if [ "$PROCESSED" -gt "0" ]; then
              TOTAL_NEW=$((TOTAL_NEW + PROCESSED))
              echo "✅ $TARGET_DATE: $PROCESSED 件追加"
            else
              echo "⏭️ $TARGET_DATE: 新規データなし"
            fi
            
            sleep 1
          done
          
          echo ""
          echo "🔥 === バッチ結果 ==="
          echo "  対象日数: $DAYS_BACK 日"
          echo "  合計処理: $TOTAL_PROCESSED 件"
          echo "  新規追加: $TOTAL_NEW 件"
          
          echo "total_processed=$TOTAL_PROCESSED" >> $GITHUB_OUTPUT
          echo "total_new=$TOTAL_NEW" >> $GITHUB_OUTPUT
        id: fetch-data
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}

      - name: Fetch stock prices
        continue-on-error: true
        run: |
          echo "📈 Fetching latest stock prices..."
          go run main.go -mode=fetch-prices 2>&1 || echo "⚠️ Price fetch had issues"
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}

      - name: Calculate Relative Strength
        continue-on-error: true
        run: |
          echo "📊 Calculating RS scores..."
          go run main.go -mode=calc-rs 2>&1 || echo "⚠️ RS calculation had issues"

      - name: Post-update DB statistics
        id: post-stats
        run: |
          echo "📊 Post-update statistics:"
          TOTAL_STOCKS="0"; WITH_SALES="0"; WITH_INCOME="0"; PRICE_STOCKS="0"
          WITH_ASSETS="0"; WITH_CASH="0"; WITH_EQUITY="0"; RS_STOCKS="0"
          if [ -f data/xbrl.db ]; then
            TOTAL_STOCKS=$(sqlite3 data/xbrl.db "SELECT COUNT(*) FROM stocks;" 2>/dev/null || echo "0")
            WITH_SALES=$(sqlite3 data/xbrl.db "SELECT COUNT(*) FROM stocks WHERE net_sales > 0;" 2>/dev/null || echo "0")
            WITH_INCOME=$(sqlite3 data/xbrl.db "SELECT COUNT(*) FROM stocks WHERE net_income > 0;" 2>/dev/null || echo "0")
            WITH_ASSETS=$(sqlite3 data/xbrl.db "SELECT COUNT(*) FROM stocks WHERE total_assets > 0;" 2>/dev/null || echo "0")
            WITH_CASH=$(sqlite3 data/xbrl.db "SELECT COUNT(*) FROM stocks WHERE cash_and_deposits > 0;" 2>/dev/null || echo "0")
            WITH_EQUITY=$(sqlite3 data/xbrl.db "SELECT COUNT(*) FROM stocks WHERE shareholders_equity > 0;" 2>/dev/null || echo "0")
            LATEST_DATE=$(sqlite3 data/xbrl.db "SELECT MAX(updated_at) FROM stocks WHERE updated_at != '';" 2>/dev/null || echo "N/A")
            echo "  Total stocks: $TOTAL_STOCKS"
            echo "  With sales: $WITH_SALES"
            echo "  With net_income: $WITH_INCOME"
            echo "  With total_assets: $WITH_ASSETS"
            echo "  With cash: $WITH_CASH"
            echo "  With equity: $WITH_EQUITY"
            echo "  Latest date: $LATEST_DATE"
          fi
          if [ -f data/stock_price.db ]; then
            PRICE_STOCKS=$(sqlite3 data/stock_price.db "SELECT COUNT(DISTINCT code) FROM stock_prices;" 2>/dev/null || echo "0")
            echo "  Stocks with prices: $PRICE_STOCKS"
          fi
          if [ -f data/rs.db ]; then
            RS_STOCKS=$(sqlite3 data/rs.db "SELECT COUNT(DISTINCT code) FROM rs_scores;" 2>/dev/null || echo "0")
            echo "  Stocks with RS: $RS_STOCKS"
          fi
          echo "total_stocks=$TOTAL_STOCKS" >> $GITHUB_OUTPUT
          echo "with_sales=$WITH_SALES" >> $GITHUB_OUTPUT
          echo "with_income=$WITH_INCOME" >> $GITHUB_OUTPUT
          echo "with_assets=$WITH_ASSETS" >> $GITHUB_OUTPUT
          echo "with_cash=$WITH_CASH" >> $GITHUB_OUTPUT
          echo "with_equity=$WITH_EQUITY" >> $GITHUB_OUTPUT
          echo "price_stocks=$PRICE_STOCKS" >> $GITHUB_OUTPUT
          echo "rs_stocks=$RS_STOCKS" >> $GITHUB_OUTPUT

      - name: Detect new stocks
        id: new-stocks
        continue-on-error: true
        run: |
          NEW_COUNT=0
          if [ -f data/xbrl.db ]; then
            WEEK_AGO=$(date -u -d "7 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d)
            NEW_STOCKS=$(sqlite3 data/xbrl.db "SELECT code || ' ' || name FROM stocks WHERE updated_at >= '$WEEK_AGO' AND net_sales > 0 ORDER BY code;" 2>/dev/null || echo "")
            if [ -n "$NEW_STOCKS" ]; then
              NEW_COUNT=$(echo "$NEW_STOCKS" | wc -l | tr -d ' ')
            fi
            echo "🆕 New stocks in last 7 days: $NEW_COUNT"
          fi
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "new_list<<$EOF" >> $GITHUB_OUTPUT
          echo "${NEW_STOCKS:-none}" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Compress databases
        run: |
          for DB_NAME in xbrl.db stock_price.db rs.db; do
            if [ -f "data/$DB_NAME" ]; then
              gzip -c "data/$DB_NAME" > "data/${DB_NAME}.gz"
              echo "📦 Compressed $DB_NAME"
            fi
          done
      
      - name: Generate release info
        id: db-info
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TOTAL_SIZE=0
          for f in data/xbrl.db.gz data/stock_price.db.gz data/rs.db.gz; do
            if [ -f "$f" ]; then
              SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
            fi
          done
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "stock_count=${{ steps.post-stats.outputs.total_stocks }}" >> $GITHUB_OUTPUT
          echo "sales_count=${{ steps.post-stats.outputs.with_sales }}" >> $GITHUB_OUTPUT
          echo "price_count=${{ steps.post-stats.outputs.price_stocks }}" >> $GITHUB_OUTPUT
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: data-${{ steps.db-info.outputs.date }}
          name: Stock Data - ${{ steps.db-info.outputs.date }}
          body: |
            📊 Daily stock data update (3-DB architecture)
            
            📅 Updated: ${{ steps.db-info.outputs.date }}
            📈 Total stocks: ${{ steps.db-info.outputs.stock_count }}
            💰 With financial data: ${{ steps.db-info.outputs.sales_count }}
            📉 With price data: ${{ steps.db-info.outputs.price_count }}
            🗄️ Total size: ${{ steps.db-info.outputs.total_size }} bytes
            
            **Files:**
            - `xbrl.db.gz` - 財務データ（EDINET XBRL）
            - `stock_price.db.gz` - 株価データ（Stooq）
            - `rs.db.gz` - リラティブストレングス
          files: |
            data/xbrl.db.gz
            data/stock_price.db.gz
            data/rs.db.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Job Summary
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          RELEASE_TAG="data-${{ steps.db-info.outputs.date }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
          DL_URL="https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG"
          
          cat << 'SUMMARY' >> $GITHUB_STEP_SUMMARY
          ## 📊 Daily Update Summary
          
          | 指標 | 値 |
          |------|------|
          SUMMARY
          echo "| 総銘柄数 | ${{ steps.post-stats.outputs.total_stocks }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 売上データあり | ${{ steps.post-stats.outputs.with_sales }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 純利益データあり | ${{ steps.post-stats.outputs.with_income }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 総資産データあり | ${{ steps.post-stats.outputs.with_assets }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 現金データあり | ${{ steps.post-stats.outputs.with_cash }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 株主資本データあり | ${{ steps.post-stats.outputs.with_equity }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 株価データあり | ${{ steps.post-stats.outputs.price_stocks }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RSデータあり | ${{ steps.post-stats.outputs.rs_stocks }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 今回追加 | ${{ steps.fetch-data.outputs.total_new }} 件 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 DB Download" >> $GITHUB_STEP_SUMMARY
          echo "- [📦 Release: $RELEASE_TAG]($RELEASE_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- [xbrl.db.gz]($DL_URL/xbrl.db.gz) | [stock_price.db.gz]($DL_URL/stock_price.db.gz) | [rs.db.gz]($DL_URL/rs.db.gz)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Analysis Pages" >> $GITHUB_STEP_SUMMARY
          echo "- [📊 Dashboard]($PAGES_URL/)" >> $GITHUB_STEP_SUMMARY
          echo "- [💎 ネットネットバリュー]($PAGES_URL/net-net-value.html)" >> $GITHUB_STEP_SUMMARY
          echo "- [🚀 オニールスクリーニング]($PAGES_URL/oneil-screen.html)" >> $GITHUB_STEP_SUMMARY
          echo "- [📈 マーケット天井検出]($PAGES_URL/market-top.html)" >> $GITHUB_STEP_SUMMARY
      
      - name: Update latest tag
        continue-on-error: true
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f latest
          git push origin latest --force

      - name: Create issue for new stocks
        if: steps.new-stocks.outputs.new_count != '0' && steps.new-stocks.outputs.new_count != ''
        uses: actions/github-script@v7
        with:
          script: |
            const newCount = '${{ steps.new-stocks.outputs.new_count }}';
            const newList = `${{ steps.new-stocks.outputs.new_list }}`;
            const date = '${{ steps.db-info.outputs.date }}';
            const pagesUrl = 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🆕 ${newCount} new stocks detected - ${date}`,
              body: `## 新規銘柄検出\n\n**検出日**: ${date}\n**新規銘柄数**: ${newCount}\n\n### 銘柄一覧\n\`\`\`\n${newList}\n\`\`\`\n\n### 確認リンク\n- [Dashboard](${pagesUrl}/)\n- [ネットネットバリュー](${pagesUrl}/net-net-value.html)\n- [オニールスクリーニング](${pagesUrl}/oneil-screen.html)`,
              labels: ['automation', 'new-stock']
            });
      
      - name: Create issue on failure or zero data
        if: failure() || steps.fetch-data.outputs.total_processed == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const isFailure = '${{ job.status }}' === 'failure';
            const totalProcessed = '${{ steps.fetch-data.outputs.total_processed }}';
            
            let title, body;
            if (isFailure) {
              title = '⚠️ Daily update failed - ' + new Date().toISOString().split('T')[0];
              body = 'The daily stock data update workflow has failed. Please check the [workflow run](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ').';
            } else {
              title = '📭 Daily update: 0 new records - ' + new Date().toISOString().split('T')[0];
              body = 'The daily update completed but added 0 new records. This may indicate:\n' +
                     '- No EDINET submissions on the target dates\n' +
                     '- EDINET API issues\n' +
                     '- XBRL parsing failures\n\n' +
                     'Check the [workflow run](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ').';
            }
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['automation', isFailure ? 'bug' : 'data-quality']
            });

